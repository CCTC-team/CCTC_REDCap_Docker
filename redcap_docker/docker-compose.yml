services:
  app:
    container_name: redcap-app
    build:
      context: ..
      dockerfile: redcap_docker/Dockerfile
      args:
        REDCAP_VERSION: ${REDCAP_VERSION}
    ports:
      - '${REDCAP_HTTP_PORT:-8080}:80'
      - '${REDCAP_HTTPS_PORT:-8443}:443'
    depends_on:
      db:
        condition: service_healthy
    environment:
      - REDCAP_VERSION=${REDCAP_VERSION}
      - MYSQL_HOSTNAME=db
      - MYSQL_DATABASE=${MYSQL_DATABASE:-redcap}
      - MYSQL_USER=root
      - MYSQL_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
      - REDCAP_SALT=${REDCAP_SALT:-12345678}
      - REDCAP_HTTPS_PORT=${REDCAP_HTTPS_PORT:-8443}

  db:
    container_name: redcap-db
    image: mariadb:10.11
    ports:
      - '${MYSQL_PORT:-3400}:3306'
    volumes:
      - mariadb_data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-redcap}
    command:
      - --max_allowed_packet=128M
      - --optimizer_switch=rowid_filter=OFF
      - --query_cache_size=16777216
      - --query_cache_type=1
      - --query_cache_limit=16777216
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mariadb_data:
