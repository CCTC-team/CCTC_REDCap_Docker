; REDCap PHP overrides, layered on php.ini-production via conf.d.

memory_limit = 512M
max_execution_time = 300
max_input_time = 60
max_input_vars = 100000

post_max_size = 100M
upload_max_filesize = 100M
max_file_uploads = 20
file_uploads = On

short_open_tag = Off
variables_order = "GPCS"
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
display_errors = Off
date.timezone = Europe/London

session.cookie_secure = On
session.use_only_cookies = 1

opcache.enable = 1
opcache.enable_cli = 0
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0

; Mailhog runs inside this same container, so route mail to localhost.
sendmail_path = "/usr/bin/mhsendmail --smtp-addr=127.0.0.1:1025"
